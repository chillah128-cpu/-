    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = null;
        
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.set(0, 0, 3.8);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        function resizeCanvas() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }
        
        container.appendChild(renderer.domElement);
        resizeCanvas();
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.3);
        mainLight.position.set(1, 2, 1.5);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(0.5, 0.3, 1.2);
        scene.add(fillLight);
        
        const warmLight = new THREE.PointLight(0xffaa88, 0.4);
        warmLight.position.set(1.2, 0.2, 0.8);
        scene.add(warmLight);
        
        const eyeGroup = new THREE.Group();
        scene.add(eyeGroup);
        
        const scleraGeometry = new THREE.SphereGeometry(0.88, 96, 96);
        const scleraMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5f5fa,
            roughness: 0.28,
            metalness: 0.08,
            emissive: 0x222222,
            emissiveIntensity: 0.03
        });
        const sclera = new THREE.Mesh(scleraGeometry, scleraMaterial);
        sclera.castShadow = true;
        eyeGroup.add(sclera);
        
        const irisGroup = new THREE.Group();
        eyeGroup.add(irisGroup);
        irisGroup.position.set(0, 0, 0.89);
        
        const irisGeometry = new THREE.SphereGeometry(0.42, 128, 128);
        const irisMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a6e8a,
            roughness: 0.25,
            metalness: 0.15,
            emissive: 0x221100,
            emissiveIntensity: 0.08
        });
        const iris = new THREE.Mesh(irisGeometry, irisMaterial);
        iris.castShadow = true;
        irisGroup.add(iris);
        
        const pupilGeometry = new THREE.SphereGeometry(0.24, 96, 96);
        const pupilMaterial = new THREE.MeshStandardMaterial({
            color: 0x030303,
            roughness: 0.12,
            metalness: 0.85,
            emissive: 0x111111,
            emissiveIntensity: 0.05
        });
        const pupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
        pupil.position.set(0, 0, 0.23);
        irisGroup.add(pupil);
        
        const highlightGeo = new THREE.SphereGeometry(0.075, 48, 48);
        const highlightMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xaaccff,
            emissiveIntensity: 0.45,
            roughness: 0.08,
            metalness: 0.95
        });
        const highlight = new THREE.Mesh(highlightGeo, highlightMat);
        highlight.position.set(0.13, 0.15, 0.38);
        irisGroup.add(highlight);

        const glowGeometry = new THREE.SphereGeometry(1, 62, 62);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0x3c73ff,
            transparent: true,
            opacity: 0.25,
            side: THREE.BackSide
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        eyeGroup.add(glow);
        
        const targetRotation = { x: 0, y: 0 };
        const currentRotation = { x: 0, y: 0 };
        const MAX_ANGLE_X = 0.48;
        const MAX_ANGLE_Y = 0.44;
        
        window.addEventListener('mousemove', (event) => {
            const mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            const mouseY = (event.clientY / window.innerHeight) * 2 - 1;
            targetRotation.y = mouseX * MAX_ANGLE_X;
            targetRotation.x = mouseY * MAX_ANGLE_Y;
        });
        
        function animateEye() {
            requestAnimationFrame(animateEye);
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.18;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.18;
            irisGroup.rotation.x = currentRotation.x;
            irisGroup.rotation.y = currentRotation.y;
            renderer.render(scene, camera);
        }
        
        animateEye();
        
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        
        function updateScroll() {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = Math.min(100, Math.max(0, (window.scrollY / scrollHeight) * 100));
            
            const paths = document.querySelectorAll('.vessel-path, .vessel-path-secondary, .vessel-path-capillary');
            const totalPaths = paths.length;
            const visiblePaths = Math.floor((progress / 100) * totalPaths);
            
            paths.forEach((path, idx) => {
                if (idx <= visiblePaths) {
                    path.classList.add('vessel-glow');
                } else {
                    path.classList.remove('vessel-glow');
                }
            });
        }
        
        window.addEventListener('scroll', updateScroll);
        updateScroll();
    </script>
